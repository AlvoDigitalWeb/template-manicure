<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="roseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bd8e7d" />
      <stop offset="100%" stop-color="#a87968" />
    </linearGradient>
  </defs>
  <!-- Elegant soft circular background matching theme accent colors -->
  <circle cx="50" cy="50" r="50" fill="url(#roseGradient)" />
  
  <!-- "S" Monogram (Studio) in serif font -->
  <text x="50" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="65" fill="#ffffff" text-anchor="middle" font-weight="normal">S</text>
</svg>